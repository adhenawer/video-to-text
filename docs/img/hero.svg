<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf4e8"/>
      <stop offset="1" stop-color="#f0e6d0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#C17C3E"/>
    </marker>
  </defs>

  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Card 1: URL input -->
  <g transform="translate(30,50)" filter="url(#shadow)">
    <rect width="180" height="180" rx="12" fill="#ffffff" stroke="#D4B896"/>
    <rect width="180" height="28" rx="12" fill="#3D3529"/>
    <rect y="16" width="180" height="12" fill="#3D3529"/>
    <circle cx="14" cy="14" r="4" fill="#FF5F57"/>
    <circle cx="30" cy="14" r="4" fill="#FEBC2E"/>
    <circle cx="46" cy="14" r="4" fill="#28C840"/>
    <text x="90" y="18" font-size="10" fill="#D4D0C8" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">claude</text>
    <text x="14" y="60" font-size="11" fill="#3D3529" font-family="ui-monospace,Menlo,monospace">&gt; add article</text>
    <text x="14" y="78" font-size="11" fill="#3D3529" font-family="ui-monospace,Menlo,monospace">  from</text>
    <text x="14" y="100" font-size="10" fill="#8B5E3C" font-family="ui-monospace,Menlo,monospace">  youtu.be/</text>
    <text x="14" y="114" font-size="10" fill="#8B5E3C" font-family="ui-monospace,Menlo,monospace">  We7BZVKbCVw</text>
    <text x="14" y="148" font-size="10" fill="#7A6F5F" font-family="ui-monospace,Menlo,monospace">▮</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="220" y1="140" x2="280" y2="140" stroke="#C17C3E" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Card 2: Pipeline -->
  <g transform="translate(290,50)" filter="url(#shadow)">
    <rect width="180" height="180" rx="12" fill="#ffffff" stroke="#D4B896"/>
    <text x="90" y="28" font-size="13" font-weight="600" fill="#2C2416" text-anchor="middle">Pipeline</text>
    <line x1="14" y1="38" x2="166" y2="38" stroke="#D4B896" stroke-dasharray="3 3"/>
    <text x="14" y="62" font-size="11" fill="#3D3529">📺 fetch transcript</text>
    <text x="14" y="86" font-size="11" fill="#3D3529">🎙 mlx-whisper</text>
    <text x="14" y="110" font-size="11" fill="#3D3529">🧠 Claude translates</text>
    <text x="14" y="134" font-size="11" fill="#3D3529">📄 build HTML</text>
    <text x="14" y="158" font-size="11" fill="#3D3529">🚀 commit + push</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="480" y1="140" x2="540" y2="140" stroke="#C17C3E" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Card 3: Article (browser mock) -->
  <g transform="translate(550,50)" filter="url(#shadow)">
    <rect width="320" height="180" rx="12" fill="#ffffff" stroke="#D4B896"/>
    <rect width="320" height="28" rx="12" fill="#F0E6D0"/>
    <rect y="16" width="320" height="12" fill="#F0E6D0"/>
    <circle cx="14" cy="14" r="4" fill="#FF5F57"/>
    <circle cx="30" cy="14" r="4" fill="#FEBC2E"/>
    <circle cx="46" cy="14" r="4" fill="#28C840"/>
    <rect x="100" y="8" width="190" height="14" rx="7" fill="#ffffff" stroke="#D4B896"/>
    <text x="110" y="18" font-size="9" fill="#7A6F5F" font-family="ui-monospace,Menlo,monospace">adhenawer.net/posts/…</text>

    <text x="16" y="56" font-size="13" font-weight="700" fill="#2C2416">Chefe do Claude Code</text>
    <text x="16" y="72" font-size="10" fill="#7A6F5F" font-style="italic">Lenny's Podcast · Boris Cherny</text>

    <rect x="16" y="82" width="32" height="14" rx="7" fill="#C17C3E"/>
    <text x="32" y="92" font-size="8" fill="#FAF4E8" text-anchor="middle">🇧🇷 PT</text>
    <rect x="52" y="82" width="32" height="14" rx="7" fill="#EDE4D3" stroke="#D4B896"/>
    <text x="68" y="92" font-size="8" fill="#3D3529" text-anchor="middle">🇺🇸 EN</text>

    <text x="16" y="116" font-size="10" font-weight="700" fill="#2C2416">INTRODUÇÃO</text>
    <rect x="16" y="122" width="288" height="5" rx="2" fill="#EDE4D3"/>
    <rect x="16" y="131" width="270" height="5" rx="2" fill="#EDE4D3"/>
    <rect x="16" y="140" width="250" height="5" rx="2" fill="#EDE4D3"/>
    <text x="16" y="158" font-size="10" font-weight="700" fill="#2C2416">DE DOIS LIKES A UM FENÔMENO</text>
    <rect x="16" y="164" width="288" height="5" rx="2" fill="#EDE4D3"/>
  </g>

  <!-- Label -->
  <text x="450" y="254" font-size="12" fill="#7A6F5F" text-anchor="middle">URL → transcription → translation → bilingual article (PT-BR + EN)</text>
</svg>
