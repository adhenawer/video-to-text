    emptyEl.textContent = 'Falha ao carregar data/moc.json';
    return;
  }
  if (!data || !data.nodes || !data.nodes.length) {
    emptyEl.hidden = false;
    return;
  }

  const rect = () => svg.getBoundingClientRect();
  let W = rect().width;
  let H = rect().height;

  // --- Layout state ---
  const nodes = data.nodes.map((n, i) => {
    // start on a grid jittered a bit — scatter fills the canvas
    const cols = Math.ceil(Math.sqrt(data.nodes.length * (W / H)));
    const rows = Math.ceil(data.nodes.length / cols);
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cellW = W / (cols + 1);
    const cellH = H / (rows + 1);
    return {
      ...n,
      x: cellW * (col + 1) + (Math.random() - 0.5) * cellW * 0.5,
      y: cellH * (row + 1) + (Math.random() - 0.5) * cellH * 0.5,
      vx: 0, vy: 0,
      degree: 0,
    };
  });
  const byId = new Map(nodes.map(n => [n.id, n]));
  const edges = data.edges
    .map(e => ({ source: byId.get(e.source), target: byId.get(e.target) }))
    .filter(e => e.source && e.target);
  edges.forEach(e => { e.source.degree++; e.target.degree++; });

  const adjacency = new Map();
  edges.forEach(e => {
    if (!adjacency.has(e.source.id)) adjacency.set(e.source.id, new Set());
    if (!adjacency.has(e.target.id)) adjacency.set(e.target.id, new Set());
    adjacency.get(e.source.id).add(e.target.id);
    adjacency.get(e.target.id).add(e.source.id);
  });

  statsEl.innerHTML = `<strong>${nodes.length}</strong> artigos · <strong>${edges.length}</strong> conexões`;

  // --- Render static elements ---
  const edgeEls = edges.map(e => {
    const line = document.createElementNS(SVG_NS, 'line');
    line.setAttribute('class', 'moc-edge');
    edgesG.appendChild(line);
    e.el = line;
    return line;
  });

  const nodeEls = nodes.map(n => {
    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('class', 'moc-node');
    g.setAttribute('data-id', n.id);
    const circle = document.createElementNS(SVG_NS, 'circle');
    const r = Math.min(12, 4 + Math.sqrt(n.degree) * 2.1);
    circle.setAttribute('r', r);
    g.appendChild(circle);
    const text = document.createElementNS(SVG_NS, 'text');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('x', 0);
    text.setAttribute('y', r + 12);
    text.textContent = n.title;
    g.appendChild(text);

    // click → open article
    g.addEventListener('click', (ev) => {
      if (g.dataset.dragged === '1') { g.dataset.dragged = '0'; return; }
      window.location.href = n.url_pt;
    });
    // hover → highlight
    g.addEventListener('mouseenter', () => highlight(n.id));
    g.addEventListener('mouseleave', () => highlight(null));

    nodesG.appendChild(g);
    n.el = g;
    n.r = r;
    // estimate half-width of the label (used for collision avoidance)
    n.hw = Math.max(r, n.title.length * 3.1);
    n.hh = r + 18;
    return g;
  });

  function highlight(id) {
    if (!id) {
      nodeEls.forEach(el => el.classList.remove('hl', 'dim'));
      edgeEls.forEach(el => el.classList.remove('hl', 'dim'));
      return;
    }
    const neigh = adjacency.get(id) || new Set();
    nodeEls.forEach(el => {
      const nid = el.dataset.id;
      el.classList.toggle('hl', nid === id);
      el.classList.toggle('dim', nid !== id && !neigh.has(nid));
    });
    edges.forEach(e => {
      const touch = e.source.id === id || e.target.id === id;
      e.el.classList.toggle('hl', touch);
      e.el.classList.toggle('dim', !touch);
    });
  }

  // --- Force simulation (Fruchterman-Reingold-ish) ---
  let alpha = 1;
  const targetLen = 190;
  const repel = 11000;
  const centerPull = 0.005;
  const damping = 0.86;

  function step() {
    if (alpha < 0.01) { requestAnimationFrame(step); return; }
    for (const n of nodes) { n.fx = 0; n.fy = 0; }

    // repulsion (O(n^2) — fine for n<200)
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        let dx = a.x - b.x, dy = a.y - b.y;
        let d2 = dx * dx + dy * dy;
        if (d2 < 1) { d2 = 1; dx = Math.random() - 0.5; dy = Math.random() - 0.5; }
        const f = repel / d2;
        const d = Math.sqrt(d2);
        const fx = (dx / d) * f;
        const fy = (dy / d) * f;
        a.fx += fx; a.fy += fy;
        b.fx -= fx; b.fy -= fy;

        // bounding-box collision (labels): push out if rects overlap
        const ox = (a.hw + b.hw) - Math.abs(dx);
        const oy = (a.hh + b.hh) - Math.abs(dy);
        if (ox > 0 && oy > 0) {
          const sign = dx === 0 ? (Math.random() - 0.5) : Math.sign(dx);
          const push = Math.min(ox, 14);
          a.fx += sign * push * 0.9;
          b.fx -= sign * push * 0.9;
          if (oy < ox) {
            const sy = dy === 0 ? (Math.random() - 0.5) : Math.sign(dy);
            a.fy += sy * oy * 0.6;
            b.fy -= sy * oy * 0.6;
          }
        }
      }
    }

    // spring on edges
    for (const e of edges) {
      const a = e.source, b = e.target;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      const diff = d - targetLen;
      const f = diff * 0.028;
      const fx = (dx / d) * f;
      const fy = (dy / d) * f;
      a.fx += fx; a.fy += fy;
      b.fx -= fx; b.fy -= fy;
    }

    // center pull
    for (const n of nodes) {
      n.fx += (W / 2 - n.x) * centerPull;
      n.fy += (H / 2 - n.y) * centerPull;
    }

    for (const n of nodes) {
      if (n.pinned) continue;
      n.vx = (n.vx + n.fx * alpha) * damping;
      n.vy = (n.vy + n.fy * alpha) * damping;
      n.x += n.vx;
      n.y += n.vy;
      const pad = 30;
      n.x = Math.max(pad, Math.min(W - pad, n.x));
      n.y = Math.max(pad, Math.min(H - pad, n.y));
    }

    alpha *= 0.992;
    paint();
    requestAnimationFrame(step);
  }

  function paint() {
    for (const n of nodes) {
      n.el.setAttribute('transform', `translate(${n.x.toFixed(1)}, ${n.y.toFixed(1)})`);
    }
    for (const e of edges) {
      e.el.setAttribute('x1', e.source.x.toFixed(1));
      e.el.setAttribute('y1', e.source.y.toFixed(1));
      e.el.setAttribute('x2', e.target.x.toFixed(1));
      e.el.setAttribute('y2', e.target.y.toFixed(1));
    }
  }

  requestAnimationFrame(step);

  // --- Drag nodes ---
  let dragging = null;
  nodeEls.forEach(el => {
    el.addEventListener('mousedown', startDrag);
    el.addEventListener('touchstart', startDrag, { passive: false });
  });
  function toLocal(ev) {
    const pt = svg.createSVGPoint();
    const e = ev.touches ? ev.touches[0] : ev;
    pt.x = e.clientX; pt.y = e.clientY;
    const ctm = viewport.getScreenCTM().inverse();
    return pt.matrixTransform(ctm);
  }
  function startDrag(ev) {
    ev.preventDefault();
    const id = ev.currentTarget.dataset.id;
    dragging = byId.get(id);
    dragging.pinned = true;
    dragging.el.dataset.dragged = '0';
  }
  window.addEventListener('mousemove', onDrag);
  window.addEventListener('touchmove', onDrag, { passive: false });
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);
  function onDrag(ev) {
    if (!dragging) return;
    ev.preventDefault();
    const p = toLocal(ev);
    dragging.x = p.x; dragging.y = p.y;
    dragging.vx = 0; dragging.vy = 0;
    dragging.el.dataset.dragged = '1';
    alpha = Math.max(alpha, 0.3);
  }
  function endDrag() {
    if (dragging) dragging.pinned = false;
    dragging = null;
  }

  // --- Pan & zoom ---
  let vx = 0, vy = 0, vk = 1;
  let panning = null;
  function applyTransform() {
    viewport.setAttribute('transform', `translate(${vx}, ${vy}) scale(${vk})`);
  }
  svg.addEventListener('wheel', (ev) => {
    ev.preventDefault();
    const p = toLocal(ev);
    const delta = -ev.deltaY * 0.0015;
    const newK = Math.max(0.35, Math.min(3, vk * (1 + delta)));
    const factor = newK / vk;
    vx = p.x - (p.x - vx) * factor;
    vy = p.y - (p.y - vy) * factor;
    vk = newK;
    applyTransform();
  }, { passive: false });
  svg.addEventListener('mousedown', (ev) => {
    if (ev.target.closest('.moc-node')) return;
    panning = { x: ev.clientX, y: ev.clientY, vx, vy };
  });
  window.addEventListener('mousemove', (ev) => {
    if (!panning) return;
    vx = panning.vx + (ev.clientX - panning.x);
    vy = panning.vy + (ev.clientY - panning.y);
    applyTransform();
  });
  window.addEventListener('mouseup', () => { panning = null; });

  // --- Search filter ---
  searchEl.addEventListener('input', () => {
    const q = searchEl.value.trim().toLowerCase();
    if (!q) { nodeEls.forEach(el => el.classList.remove('dim')); edgeEls.forEach(el => el.classList.remove('dim')); return; }
    const match = new Set();
    nodes.forEach(n => { if (n.title.toLowerCase().includes(q) || n.subtitle.toLowerCase().includes(q)) match.add(n.id); });
    nodeEls.forEach(el => el.classList.toggle('dim', !match.has(el.dataset.id)));
    edges.forEach(e => e.el.classList.toggle('dim', !(match.has(e.source.id) && match.has(e.target.id))));
  });

  resetBtn.addEventListener('click', () => {
    const cols = Math.ceil(Math.sqrt(nodes.length * (W / H)));
    const rows = Math.ceil(nodes.length / cols);
    const cellW = W / (cols + 1);
    const cellH = H / (rows + 1);
    nodes.forEach((n, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      n.x = cellW * (col + 1) + (Math.random() - 0.5) * cellW * 0.5;
      n.y = cellH * (row + 1) + (Math.random() - 0.5) * cellH * 0.5;
      n.vx = 0; n.vy = 0;
    });
    alpha = 1;
    vx = 0; vy = 0; vk = 1;
    applyTransform();
  });

  // --- Resize ---
  window.addEventListener('resize', () => {
    W = rect().width;
    H = rect().height;
    alpha = Math.max(alpha, 0.2);
  });
})();
</script>
</body>
</html>
